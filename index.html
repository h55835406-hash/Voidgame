<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; }
        .ui { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 20px; width: 100%; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; -webkit-user-select: none; }
        .jump-btn { position: absolute; right: 40px; bottom: 20px; width: 80px; height: 80px; background: rgba(255,0,0,0.3); }
        #menu { position: absolute; inset: 0; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #playBtn { padding: 15px 40px; background: #f00; border: none; color: #fff; font-size: 24px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="menu">
        <h1 style="letter-spacing: 5px;">STORIES FROM THE VOID</h1>
        <p>By Hafa Studio</p>
        <button id="playBtn">PLAY</button>
    </div>

    <div class="ui" id="controls" style="display:none">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="rightBtn">→</div>
        <div class="btn jump-btn" id="jumpBtn">UP</div>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const raw = "https://raw.githubusercontent.com/h55835406-hash/Voidgame/main/";

        const imgs = {
            ip1: raw+"rightp1.png", ip2: raw+"rightp2.png", // игрок вправо
            il1: raw+"leftp1.png", il2: raw+"leftp2.png",   // игрок влево (использовал твои названия)
            id1: raw+"idle1.png", id2: raw+"idle2.png",      // игрок стоит/моргает
            m1: raw+"idlem1.png", mr1: raw+"rightm1.png", mr2: raw+"rightm2.png", // монстр вправо
            ml1: raw+"leftm1.png", ml2: raw+"leftm2.png", // монстр влево
            g1: raw+"grass1.jpg", g2: raw+"grass2.jpg", grib: raw+"grib.png"
        };

        const s = {};
        Object.keys(imgs).forEach(k => { s[k] = new Image(); s[k].src = imgs[k]; });

        let gameState = 'menu', camX = 0;
        const p = { x: 300, y: 0, w: 80, h: 140, dx: 0, dy: 0, g: true, dir: 'r', walk: false };
        const gribs = [], enemies = [];

        function spawnGrib(x) {
            let size = 100 + Math.random() * 200;
            gribs.push({ x, y: canvas.height - size - 100, size });
        }
        for(let i=0; i<15; i++) spawnGrib(i * 400);

        function update() {
            if(gameState !== 'play') return;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            camX += (p.x - camX - canvas.width/2) * 0.05; // Камера ближе к герою
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.save();
            ctx.translate(-camX, 0);

            // Бесконечный мир
            for(let i = Math.floor(camX/100)*100 - 100; i < camX + canvas.width + 100; i+=100) {
                ctx.drawImage(s.g1, i, canvas.height-100, 100, 50);
                ctx.drawImage(s.g2, i, canvas.height-50, 100, 50);
            }

            gribs.forEach(g => ctx.drawImage(s.grib, g.x, g.y, g.size, g.size));
            if(gribs[gribs.length-1].x < camX + canvas.width + 500) spawnGrib(gribs[gribs.length-1].x + 400);

            // Монстры
            if(Math.random() < 0.005) enemies.push({x: p.x + 800, y: canvas.height-180, w: 100, h: 100});
            enemies.forEach(e => {
                let edir = p.x > e.x ? 2 : -2;
                e.x += edir;
                let mImg = s.m1;
                if(edir > 0) mImg = (Date.now()%400 > 200) ? s.mr1 : s.mr2;
                else mImg = (Date.now()%400 > 200) ? s.ml1 : s.ml2;
                ctx.drawImage(mImg, e.x, e.y, e.w, e.h);
            });

            // Анимация игрока
            let cur = s.id1;
            if(p.dx > 0) cur = (Date.now()%400 > 200) ? s.ip1 : s.ip2;
            else if(p.dx < 0) cur = (Date.now()%400 > 200) ? s.il1 : s.il2;
            else if(Date.now()%3000 < 300) cur = s.id2; // моргание

            ctx.drawImage(cur, p.x, p.y, p.w, p.h);

            p.x += p.dx; p.y += p.dy;
            if(p.y + p.h < canvas.height-100) { p.dy += 0.8; p.g = false; }
            else { p.dy = 0; p.y = canvas.height-100-p.h; p.g = true; }

            ctx.restore();
            requestAnimationFrame(update);
        }

        const play = () => { gameState = 'play'; document.getElementById('menu').style.display='none'; document.getElementById('controls').style.display='flex'; update(); };
        document.getElementById('playBtn').onclick = play;

        // Мобильное управление
        const ctrl = (id, val, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); if(k=='j') { if(p.g) p.dy=-18; } else p.dx=val; };
            el.ontouchend = () => { if(k!='j') p.dx=0; };
        };
        ctrl('leftBtn', -7); ctrl('rightBtn', 7); ctrl('jumpBtn', 0, 'j');
    </script>
</body>
</html>
