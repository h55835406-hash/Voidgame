<!DOCTYPE html>
<html>
<body style="margin: 0; overflow: hidden; background: #050505;">
    <canvas id="game"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const images = {
            idle1: 'https://raw.githubusercontent.com/h55835406-hash/Voidgame/main/idle1.png',
            idlem1: 'https://raw.githubusercontent.com/h55835406-hash/Voidgame/main/idlem1.png',
            rightm1: 'https://raw.githubusercontent.com/h55835406-hash/Voidgame/main/rightm1.png',
            rightm2: 'https://raw.githubusercontent.com/h55835406-hash/Voidgame/main/rightm2.png',
            leftm1: 'https://raw.githubusercontent.com/h55835406-hash/Voidgame/main/leftm1.png',
            leftm2: 'https://raw.githubusercontent.com/h55835406-hash/Voidgame/main/leftm2.png',
            grass: 'https://raw.githubusercontent.com/h55835406-hash/Voidgame/main/grass1.jpg',
            mushroom: 'https://raw.githubusercontent.com/h55835406-hash/Voidgame/main/grib.png'
        };

        const sprites = {};
        Object.keys(images).forEach(key => {
            sprites[key] = new Image();
            sprites[key].src = images[key];
        });

        const player = {
            x: 100, y: 100, w: 60, h: 120,
            dx: 0, dy: 0, grounded: false
        };

        let mushroomSway = 0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            mushroomSway += 0.05;
            
            // Земля
            for(let i=0; i<canvas.width; i+=50) {
                ctx.drawImage(sprites.grass, i, canvas.height-50, 50, 50);
            }

            // Тень и покачивающийся гриб
            const sway = Math.sin(mushroomSway) * 5;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath();
            ctx.ellipse(375, canvas.height-40, 60, 15, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.drawImage(sprites.mushroom, 300 + sway, canvas.height-180, 150, 150);

            // Тень под игроком
            ctx.beginPath();
            ctx.ellipse(player.x + player.w/2, canvas.height-45, 25, 10, 0, 0, Math.PI*2);
            ctx.fill();

            // Анимация героя
            let current = sprites.idle1;
            if (player.dx > 0) current = (Math.floor(Date.now()/200)%2) ? sprites.rightm1 : sprites.rightm2;
            else if (player.dx < 0) current = (Math.floor(Date.now()/200)%2) ? sprites.leftm1 : sprites.leftm2;
            else if (Math.floor(Date.now()/2000)%5 === 0) current = sprites.idlem1;

            ctx.drawImage(current, player.x, player.y, player.w, player.h);
            
            player.x += player.dx;
            player.y += player.dy;
            if (player.y + player.h < canvas.height-50) {
                player.dy += 0.6;
                player.grounded = false;
            } else {
                player.dy = 0;
                player.y = canvas.height-50-player.h;
                player.grounded = true;
            }

            requestAnimationFrame(draw);
        }

        window.onkeydown = e => {
            if (e.key == 'd' || e.key == 'в') player.dx = 5;
            if (e.key == 'a' || e.key == 'ф') player.dx = -5;
            if ((e.key == 'w' || e.key == 'ц') && player.grounded) player.dy = -15;
        };
        window.onkeyup = () => player.dx = 0;

        draw();
    </script>
</body>
</html>
